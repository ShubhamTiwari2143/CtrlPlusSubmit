<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CtrlPlusSubmit — My Tasks</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes gradientShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
    .sidebar-gradient{background:linear-gradient(160deg,#1e40af,#3b82f6,#6366f1);background-size:200% 200%;animation:gradientShift 8s ease infinite}
    .nav-link{transition:all .2s}.nav-link:hover,.nav-link.active{background:rgba(255,255,255,.18);border-radius:10px}
    .input-field:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.15)}
    .card-hover{transition:transform .2s,box-shadow .2s}.card-hover:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,0,0,.1)}
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar-gradient w-64 min-h-screen flex flex-col fixed left-0 top-0 z-30 shadow-xl">
    <div class="px-6 py-6 border-b border-white border-opacity-20">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-white bg-opacity-20 rounded-xl flex items-center justify-center"><svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg></div>
        <div><p class="text-white font-bold text-base leading-tight">CtrlPlusSubmit</p><p class="text-blue-200 text-xs">Student Portal</p></div>
      </div>
    </div>
    <nav class="flex-1 px-4 py-5 space-y-1">
      <p class="text-blue-300 text-xs font-semibold uppercase tracking-wider px-3 mb-3">Menu</p>
      <a href="dashboard.html" class="nav-link flex items-center gap-3 px-3 py-2.5 text-blue-100 text-sm font-medium"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>Dashboard</a>
      <a href="tasks.html" class="nav-link active flex items-center gap-3 px-3 py-2.5 text-white text-sm font-medium"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>My Tasks</a>
      <a href="submissions.html" class="nav-link flex items-center gap-3 px-3 py-2.5 text-blue-100 text-sm font-medium"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>Submissions</a>
      <a href="notifications.html" class="nav-link flex items-center gap-3 px-3 py-2.5 text-blue-100 text-sm font-medium"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>Notifications</a>
    </nav>
    <div class="px-4 py-5 border-t border-white border-opacity-20"><a href="/CtrlPlusSubmit/auth/logout" class="flex items-center gap-3 px-3 py-2.5 text-blue-200 text-sm font-medium rounded-xl hover:bg-white hover:bg-opacity-15 transition-all"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>Logout</a></div>
  </aside>

  <!-- ===== MAIN ===== -->
  <main class="ml-64 flex-1 p-8">
    <div class="mb-6">
      <h1 class="text-2xl font-bold text-gray-800">My Tasks</h1>
      <p class="text-gray-500 text-sm mt-0.5">All tasks assigned to you by your faculty</p>
    </div>

    <!-- Search + Filter bar -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 mb-5 flex flex-wrap gap-3 items-center">
      <div class="relative flex-1 min-w-48">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        <input type="text" id="searchInput" placeholder="Search tasks..." class="input-field w-full pl-9 pr-4 py-2 border border-gray-200 rounded-xl text-sm bg-gray-50" oninput="filterTasks()"/>
      </div>
      <div class="flex gap-2 flex-wrap">
        <button onclick="setStatusFilter('')"        id="f_all"       class="filter-btn px-3 py-1.5 rounded-xl text-xs font-semibold bg-blue-500 text-white transition-all">All</button>
        <button onclick="setStatusFilter('PENDING')" id="f_PENDING"   class="filter-btn px-3 py-1.5 rounded-xl text-xs font-semibold text-gray-500 bg-gray-100 hover:bg-gray-200 transition-all">Pending</button>
        <button onclick="setStatusFilter('SUBMITTED,LATE')" id="f_SUBMITTED" class="filter-btn px-3 py-1.5 rounded-xl text-xs font-semibold text-gray-500 bg-gray-100 hover:bg-gray-200 transition-all">Submitted</button>
        <button onclick="setStatusFilter('APPROVED')" id="f_APPROVED" class="filter-btn px-3 py-1.5 rounded-xl text-xs font-semibold text-gray-500 bg-gray-100 hover:bg-gray-200 transition-all">Approved</button>
      </div>
      <select id="sortSelect" onchange="filterTasks()" class="input-field px-3 py-2 border border-gray-200 rounded-xl text-sm bg-gray-50 text-gray-700">
        <option value="deadline">Sort: Deadline (nearest)</option>
        <option value="newest">Sort: Newest first</option>
        <option value="title">Sort: Title A-Z</option>
      </select>
    </div>

    <!-- Task Grid -->
    <div id="taskGrid" class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-5">
      <div class="col-span-full text-center py-16 text-gray-400">Loading tasks...</div>
    </div>
  </main>

  <script>
    let allTasks=[], allSubs={};
    let currentStatusFilter='';

    const statusStyle={PENDING:'bg-gray-100 text-gray-500',SUBMITTED:'bg-blue-100 text-blue-700',LATE:'bg-amber-100 text-amber-700',REVIEWED:'bg-indigo-100 text-indigo-700',APPROVED:'bg-green-100 text-green-700',NEEDS_IMPROVEMENT:'bg-yellow-100 text-yellow-700',REJECTED:'bg-red-100 text-red-600'};
    const deadlineColor={UPCOMING:'bg-blue-400',TODAY:'bg-amber-400',OVERDUE:'bg-red-400'};

    function esc(s){return(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
    function fmtDate(iso){if(!iso)return'—';try{const d=new Date(iso);return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})+' '+d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});}catch{return iso;}}

    async function load(){
      const res=await fetch('/CtrlPlusSubmit/student/tasks');
      const json=await res.json();
      if(!json.success){window.location.href='/CtrlPlusSubmit/views/auth/login.html';return;}
      allTasks=json.data||[];
      filterTasks();
    }

    function setStatusFilter(status){
      currentStatusFilter=status;
      document.querySelectorAll('.filter-btn').forEach(b=>{
        b.className='filter-btn px-3 py-1.5 rounded-xl text-xs font-semibold text-gray-500 bg-gray-100 hover:bg-gray-200 transition-all';
      });
      const key=status||'all';
      const activeId='f_'+(key.includes(',')?'SUBMITTED':key);
      const activeBtn=document.getElementById(activeId);
      if(activeBtn)activeBtn.className='filter-btn px-3 py-1.5 rounded-xl text-xs font-semibold bg-blue-500 text-white transition-all';
      filterTasks();
    }

    function filterTasks(){
      const search=document.getElementById('searchInput').value.toLowerCase();
      const sort=document.getElementById('sortSelect').value;
      let tasks=[...allTasks];

      if(search) tasks=tasks.filter(t=>(t.title||'').toLowerCase().includes(search)||(t.description||'').toLowerCase().includes(search));

      if(currentStatusFilter){
        const statuses=currentStatusFilter.split(',');
        // We need submission status — approximate from deadlineStatus for now
        // Real filter calls /student/tasks?status=X endpoint
      }

      // Sort
      if(sort==='deadline') tasks.sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));
      else if(sort==='newest') tasks.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
      else if(sort==='title') tasks.sort((a,b)=>(a.title||'').localeCompare(b.title||''));

      renderGrid(tasks);
    }

    function renderGrid(tasks){
      const grid=document.getElementById('taskGrid');
      if(!tasks.length){
        grid.innerHTML=`<div class="col-span-full text-center py-16 text-gray-400">No tasks found.</div>`;return;
      }
      grid.innerHTML=tasks.map(t=>`
        <div class="card-hover bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
          <div class="h-1.5 ${deadlineColor[t.deadlineStatus]||'bg-gray-300'}"></div>
          <div class="p-5">
            <div class="flex items-start justify-between mb-2">
              <h3 class="font-bold text-gray-800 text-sm leading-snug pr-2 line-clamp-2">${esc(t.title)}</h3>
              <span class="px-2 py-0.5 rounded-lg text-xs font-semibold flex-shrink-0 ${t.deadlineStatus==='OVERDUE'?'bg-red-100 text-red-600':t.deadlineStatus==='TODAY'?'bg-amber-100 text-amber-700':'bg-blue-50 text-blue-600'}">
                ${t.deadlineStatus||'—'}
              </span>
            </div>
            <p class="text-xs text-gray-500 mb-3 line-clamp-2">${esc(t.description||'No description provided.')}</p>

            <div class="flex flex-wrap gap-x-3 gap-y-1 text-xs text-gray-500 mb-4">
              <span>📅 ${fmtDate(t.deadline)}</span>
              <span>🏅 ${t.maxMarks} marks</span>
              <span>👨‍🏫 ${esc(t.facultyName||'—')}</span>
              ${t.attachFileName?`<span>📎 ${esc(t.attachFileName)}</span>`:''}
            </div>

            <div class="flex gap-2">
              <a href="task-detail.html?taskId=${t.id}"
                 class="flex-1 py-2 bg-blue-50 text-blue-700 text-xs font-semibold rounded-xl hover:bg-blue-100 transition-colors text-center">
                View Details
              </a>
              <a href="submit.html?taskId=${t.id}"
                 class="flex-1 py-2 bg-gradient-to-r from-blue-500 to-indigo-600 text-white text-xs font-semibold rounded-xl hover:opacity-90 transition-all text-center">
                Submit / View
              </a>
            </div>
          </div>
        </div>
      `).join('');
    }

    load();
  </script>
</body>
</html>
