<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CtrlPlusSubmit — Student Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes gradientShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
    .sidebar-gradient{background:linear-gradient(160deg,#1e40af,#3b82f6,#6366f1);background-size:200% 200%;animation:gradientShift 8s ease infinite}
    .nav-link{transition:all .2s}.nav-link:hover,.nav-link.active{background:rgba(255,255,255,.18);border-radius:10px}
    @keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .stat-animate{animation:countUp .5s ease forwards}
    .card-hover{transition:transform .2s,box-shadow .2s}.card-hover:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,0,0,.1)}
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar-gradient w-64 min-h-screen flex flex-col fixed left-0 top-0 z-30 shadow-xl">
    <div class="px-6 py-6 border-b border-white border-opacity-20">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-white bg-opacity-20 rounded-xl flex items-center justify-center">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
        </div>
        <div><p class="text-white font-bold text-base leading-tight">CtrlPlusSubmit</p><p class="text-blue-200 text-xs">Student Portal</p></div>
      </div>
    </div>
    <nav class="flex-1 px-4 py-5 space-y-1">
      <p class="text-blue-300 text-xs font-semibold uppercase tracking-wider px-3 mb-3">Menu</p>
      <a href="dashboard.html" class="nav-link active flex items-center gap-3 px-3 py-2.5 text-white text-sm font-medium">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Dashboard
      </a>
      <a href="tasks.html" class="nav-link flex items-center gap-3 px-3 py-2.5 text-blue-100 text-sm font-medium">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        My Tasks
      </a>
      <a href="submissions.html" class="nav-link flex items-center gap-3 px-3 py-2.5 text-blue-100 text-sm font-medium">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        Submissions
      </a>
      <a href="notifications.html" class="nav-link flex items-center gap-3 px-3 py-2.5 text-blue-100 text-sm font-medium">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
        Notifications
        <span id="notifBadge" class="ml-auto bg-rose-500 text-white text-xs font-bold px-2 py-0.5 rounded-full hidden"></span>
      </a>
    </nav>
    <div class="px-4 py-5 border-t border-white border-opacity-20">
      <a href="/CtrlPlusSubmit/auth/logout" class="flex items-center gap-3 px-3 py-2.5 text-blue-200 text-sm font-medium rounded-xl hover:bg-white hover:bg-opacity-15 transition-all">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        Logout
      </a>
    </div>
  </aside>

  <!-- ===== MAIN ===== -->
  <main class="ml-64 flex-1 p-8">
    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-2xl font-bold text-gray-800">Dashboard</h1>
        <p class="text-gray-500 text-sm mt-0.5" id="welcomeMsg">Loading...</p>
      </div>
      <div class="w-9 h-9 rounded-full bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-white text-sm font-bold" id="avatarInitial">S</div>
    </div>

    <!-- Stat Cards -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
      <div class="card-hover bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
        <div class="w-10 h-10 rounded-xl bg-blue-100 flex items-center justify-center mb-3">
          <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        </div>
        <p class="text-2xl font-bold text-gray-800 stat-animate" id="statTotal">—</p>
        <p class="text-xs text-gray-500 mt-1">Total tasks</p>
      </div>
      <div class="card-hover bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
        <div class="w-10 h-10 rounded-xl bg-amber-100 flex items-center justify-center mb-3">
          <svg class="w-5 h-5 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        </div>
        <p class="text-2xl font-bold text-gray-800 stat-animate" id="statPending">—</p>
        <p class="text-xs text-gray-500 mt-1">Pending</p>
      </div>
      <div class="card-hover bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
        <div class="w-10 h-10 rounded-xl bg-teal-100 flex items-center justify-center mb-3">
          <svg class="w-5 h-5 text-teal-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
        </div>
        <p class="text-2xl font-bold text-gray-800 stat-animate" id="statSubmitted">—</p>
        <p class="text-xs text-gray-500 mt-1">Submitted</p>
      </div>
      <div class="card-hover bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
        <div class="w-10 h-10 rounded-xl bg-green-100 flex items-center justify-center mb-3">
          <svg class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        </div>
        <p class="text-2xl font-bold text-gray-800 stat-animate" id="statReviewed">—</p>
        <p class="text-xs text-gray-500 mt-1">Reviewed</p>
      </div>
    </div>

    <!-- Two column layout -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

      <!-- Upcoming Deadlines -->
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
        <div class="flex items-center justify-between mb-4">
          <h2 class="font-bold text-gray-800 text-base">Upcoming Deadlines</h2>
          <a href="tasks.html" class="text-xs text-blue-500 hover:text-blue-700 font-medium">View all →</a>
        </div>
        <div id="upcomingList" class="space-y-3">
          <p class="text-sm text-gray-400 text-center py-4">Loading...</p>
        </div>
      </div>

      <!-- Recent Submissions -->
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
        <div class="flex items-center justify-between mb-4">
          <h2 class="font-bold text-gray-800 text-base">Recent Submissions</h2>
          <a href="submissions.html" class="text-xs text-blue-500 hover:text-blue-700 font-medium">View all →</a>
        </div>
        <div id="recentList" class="space-y-3">
          <p class="text-sm text-gray-400 text-center py-4">Loading...</p>
        </div>
      </div>
    </div>
  </main>

  <script>
    const statusStyle={PENDING:'bg-gray-100 text-gray-600',SUBMITTED:'bg-blue-100 text-blue-700',LATE:'bg-amber-100 text-amber-700',REVIEWED:'bg-indigo-100 text-indigo-700',APPROVED:'bg-green-100 text-green-700',NEEDS_IMPROVEMENT:'bg-yellow-100 text-yellow-700',REJECTED:'bg-red-100 text-red-600'};

    function fmtDeadline(iso){
      if(!iso)return'—';
      const d = new Date(iso);
      const now = new Date();

      // Midnight to midnight comparison to fix the "Today" vs "Tomorrow" bug
      const dMidnight = new Date(d.getFullYear(), d.getMonth(), d.getDate());
      const nowMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const diffDays = Math.round((dMidnight - nowMidnight) / (1000 * 60 * 60 * 24));

      const base = d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});

      if (diffDays === 0) return base + ' ⚠️ Today!';
      if (diffDays === 1) return base + ' ⚠️ Tomorrow!';
      if (diffDays > 1 && diffDays <= 3) return base + ' · ' + diffDays + 'd left';
      if (diffDays < 0) return base + ' ⚠️ Overdue';
      
      return base;
    }
    
    function fmtDate(iso){if(!iso)return'—';try{return new Date(iso).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}catch{return iso;}}

    async function load(){
      const res=await fetch('/CtrlPlusSubmit/student/dashboard');
      const json=await res.json();
      if(!json.success){window.location.href='/CtrlPlusSubmit/views/auth/login.html';return;}
      const d=json.data;

      document.getElementById('statTotal').textContent    = d.stats?.totalTasks  ?? 0;
      document.getElementById('statPending').textContent  = d.stats?.pending      ?? 0;
      document.getElementById('statSubmitted').textContent= d.stats?.submitted    ?? 0;
      document.getElementById('statReviewed').textContent = d.stats?.reviewed     ?? 0;

      const name=d.student?.fullName??'Student';
      document.getElementById('welcomeMsg').textContent='Welcome back, '+name+'!';
      document.getElementById('avatarInitial').textContent=name.charAt(0).toUpperCase();

      const unread=d.unreadNotifications??0;
      if(unread>0){
        document.getElementById('notifBadge').textContent=unread;
        document.getElementById('notifBadge').classList.remove('hidden');
      }

      // --- BUG FIX: Filter out tasks that are already submitted, reviewed, or approved ---
      const pendingTasks = (d.upcomingDeadlines || []).filter(t => !['SUBMITTED', 'REVIEWED', 'APPROVED'].includes(t.status));

      // Upcoming deadlines render
      const ul=document.getElementById('upcomingList');
      if(pendingTasks.length === 0){
        ul.innerHTML='<p class="text-sm text-gray-400 text-center py-4">No pending deadlines in the next 7 days 🎉</p>';
      } else {
        ul.innerHTML=pendingTasks.map(t=>`
          <a href="task-detail.html?taskId=${t.taskId}" class="flex items-center gap-3 p-3 rounded-xl bg-gray-50 hover:bg-blue-50 transition-colors block">
            <div class="w-2 h-2 rounded-full bg-amber-400 flex-shrink-0"></div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-semibold text-gray-800 truncate">${esc(t.title)}</p>
              <p class="text-xs text-gray-500">${fmtDeadline(t.deadline)} · ${esc(t.facultyName??'')}</p>
            </div>
            <span class="text-xs text-blue-500 font-medium flex-shrink-0">${t.maxMarks}pts</span>
          </a>
        `).join('');
      }

      // Recent submissions render
      const rl=document.getElementById('recentList');
      if(!d.recentSubmissions?.length){
        rl.innerHTML='<p class="text-sm text-gray-400 text-center py-4">No submissions yet. Start working on your tasks!</p>';
      } else {
        rl.innerHTML=d.recentSubmissions.map(s=>`
          <div class="flex items-center gap-3 p-3 rounded-xl bg-gray-50">
            <div class="flex-1 min-w-0">
              <p class="text-sm font-semibold text-gray-800 truncate">${esc(s.taskTitle??'—')}</p>
              <p class="text-xs text-gray-400">${fmtDate(s.submittedAt)}</p>
            </div>
            <div class="flex items-center gap-2 flex-shrink-0">
              ${s.marks!=null?`<span class="text-xs font-bold text-gray-700">${s.marks}/${s.maxMarks??100}</span>`:''}
              <span class="px-2 py-0.5 rounded-lg text-xs font-semibold ${statusStyle[s.status]||'bg-gray-100 text-gray-500'}">${s.status}</span>
            </div>
          </div>
        `).join('');
      }
    }

    function esc(s){return(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
    load();
  </script>
</body>
</html>
