<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CtrlPlusSubmit — Notifications</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes gradientShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
    .sidebar-gradient{background:linear-gradient(160deg,#1e40af,#3b82f6,#6366f1);background-size:200% 200%;animation:gradientShift 8s ease infinite}
    .nav-link{transition:all .2s}.nav-link:hover,.nav-link.active{background:rgba(255,255,255,.18);border-radius:10px}
    .toast-enter{animation:toastIn .3s ease}
    @keyframes toastIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
    .notif-unread{border-left:3px solid #3b82f6}
    .notif-read{border-left:3px solid transparent}
    .notif-card{transition:background .15s}
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar-gradient w-64 min-h-screen flex flex-col fixed left-0 top-0 z-30 shadow-xl">
    <div class="px-6 py-6 border-b border-white border-opacity-20">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-white bg-opacity-20 rounded-xl flex items-center justify-center"><svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg></div>
        <div><p class="text-white font-bold text-base leading-tight">CtrlPlusSubmit</p><p class="text-blue-200 text-xs">Student Portal</p></div>
      </div>
    </div>
    <nav class="flex-1 px-4 py-5 space-y-1">
      <p class="text-blue-300 text-xs font-semibold uppercase tracking-wider px-3 mb-3">Menu</p>
      <a href="dashboard.html" class="nav-link flex items-center gap-3 px-3 py-2.5 text-blue-100 text-sm font-medium"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>Dashboard</a>
      <a href="tasks.html" class="nav-link flex items-center gap-3 px-3 py-2.5 text-blue-100 text-sm font-medium"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>My Tasks</a>
      <a href="submissions.html" class="nav-link flex items-center gap-3 px-3 py-2.5 text-blue-100 text-sm font-medium"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>Submissions</a>
      <a href="notifications.html" class="nav-link active flex items-center gap-3 px-3 py-2.5 text-white text-sm font-medium">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
        Notifications
        <span id="unreadBadge" class="ml-auto bg-rose-500 text-white text-xs font-bold px-2 py-0.5 rounded-full hidden"></span>
      </a>
    </nav>
    <div class="px-4 py-5 border-t border-white border-opacity-20"><a href="/CtrlPlusSubmit/auth/logout" class="flex items-center gap-3 px-3 py-2.5 text-blue-200 text-sm font-medium rounded-xl hover:bg-white hover:bg-opacity-15 transition-all"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>Logout</a></div>
  </aside>

  <!-- ===== MAIN ===== -->
  <main class="ml-64 flex-1 p-8 max-w-3xl">
    <div id="toast" class="hidden fixed top-5 right-5 z-50 px-5 py-3 rounded-xl shadow-lg text-sm font-medium flex items-center gap-2 toast-enter"></div>

    <div class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-2xl font-bold text-gray-800">Notifications</h1>
        <p class="text-gray-500 text-sm mt-0.5" id="notifSubtitle">Loading...</p>
      </div>
      <button onclick="markAllRead()"
              class="flex items-center gap-1.5 px-4 py-2 bg-white border border-gray-200 text-gray-600 text-xs font-semibold rounded-xl hover:bg-gray-50 transition-colors shadow-sm">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        Mark all as read
      </button>
    </div>

    <!-- Notifications list -->
    <div id="notifList" class="space-y-3">
      <div class="text-center py-16 text-gray-400">Loading notifications...</div>
    </div>
  </main>

  <script>
    let allNotifs=[];

    const typeConfig={
      TASK_ASSIGNED:    { icon:'📋', bg:'bg-blue-50',   border:'border-blue-100',  text:'text-blue-700'   },
      SUBMISSION_REVIEWED:{ icon:'✅', bg:'bg-green-50', border:'border-green-100', text:'text-green-700'  },
      DEADLINE_REMINDER:{ icon:'⏰', bg:'bg-amber-50',  border:'border-amber-100', text:'text-amber-700'  },
      SYSTEM:           { icon:'🔔', bg:'bg-gray-50',   border:'border-gray-100',  text:'text-gray-700'   }
    };

    function toast(msg,type='success'){
      const el=document.getElementById('toast');
      el.className=`fixed top-5 right-5 z-50 px-5 py-3 rounded-xl shadow-lg text-sm font-medium flex items-center gap-2 toast-enter ${type==='success'?'bg-green-500 text-white':'bg-red-500 text-white'}`;
      el.innerHTML=`<span>${type==='success'?'✓':'✕'}</span><span>${msg}</span>`;
      el.classList.remove('hidden');
      setTimeout(()=>el.classList.add('hidden'),3000);
    }

    function esc(s){return(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
    function timeAgo(iso){
      if(!iso)return'';
      const diff=Date.now()-new Date(iso).getTime();
      const m=Math.floor(diff/60000);
      if(m<1)return'Just now';
      if(m<60)return m+'m ago';
      const h=Math.floor(m/60);
      if(h<24)return h+'h ago';
      const d=Math.floor(h/24);
      if(d<7)return d+'d ago';
      return new Date(iso).toLocaleDateString('en-IN',{day:'2-digit',month:'short'});
    }

    async function load(){
      const res=await fetch('/CtrlPlusSubmit/student/notifications');
      const json=await res.json();
      if(!json.success){window.location.href='/CtrlPlusSubmit/views/auth/login.html';return;}
      allNotifs=json.data||[];
      renderList();
    }

    function renderList(){
      const unread=allNotifs.filter(n=>!n.read).length;
      document.getElementById('notifSubtitle').textContent=unread>0?`${unread} unread notification${unread>1?'s':''}`:'All caught up';

      const badge=document.getElementById('unreadBadge');
      if(unread>0){badge.textContent=unread;badge.classList.remove('hidden');}
      else badge.classList.add('hidden');

      const list=document.getElementById('notifList');
      if(!allNotifs.length){
        list.innerHTML=`
          <div class="text-center py-20">
            <div class="text-5xl mb-4">🔔</div>
            <p class="text-gray-500 font-medium">No notifications yet</p>
            <p class="text-gray-400 text-sm mt-1">You'll be notified when tasks are assigned or submissions are reviewed.</p>
          </div>`;
        return;
      }

      list.innerHTML=allNotifs.map(n=>{
        const cfg=typeConfig[n.type]||typeConfig.SYSTEM;
        return `
          <div id="notif_${n.id}"
               class="notif-card bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden cursor-pointer hover:bg-gray-50
                      ${n.read?'notif-read':'notif-unread'}"
               onclick="markRead(${n.id})">
            <div class="flex items-start gap-4 p-4">

              <!-- Type icon -->
              <div class="w-10 h-10 rounded-xl ${cfg.bg} border ${cfg.border} flex items-center justify-center flex-shrink-0 text-lg">
                ${cfg.icon}
              </div>

              <!-- Content -->
              <div class="flex-1 min-w-0">
                <div class="flex items-start justify-between gap-2">
                  <p class="text-sm font-semibold ${n.read?'text-gray-600':'text-gray-800'}">${esc(n.title)}</p>
                  <div class="flex items-center gap-2 flex-shrink-0">
                    ${!n.read?'<span class="w-2 h-2 bg-blue-500 rounded-full flex-shrink-0"></span>':''}
                    <span class="text-xs text-gray-400">${timeAgo(n.createdAt)}</span>
                  </div>
                </div>
                <p class="text-xs text-gray-500 mt-1 leading-relaxed">${esc(n.message)}</p>
                ${n.relatedTaskId?`
                  <a href="task-detail.html?taskId=${n.relatedTaskId}"
                     onclick="event.stopPropagation()"
                     class="inline-flex items-center gap-1 mt-2 text-xs text-blue-500 hover:text-blue-700 font-medium">
                    View task →
                  </a>`:''}
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    async function markRead(notifId){
      const notif=allNotifs.find(n=>n.id===notifId);
      if(!notif||notif.read)return;

      const body=new URLSearchParams({action:'markRead',notifId});
      const res=await fetch('/CtrlPlusSubmit/student/notifications',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body});
      const json=await res.json();
      if(json.success){
        notif.read=true;
        // Update card style without full re-render
        const card=document.getElementById('notif_'+notifId);
        if(card){
          card.classList.remove('notif-unread');
          card.classList.add('notif-read');
          const dot=card.querySelector('.bg-blue-500.rounded-full');
          if(dot)dot.remove();
        }
        // Update subtitle + badge
        const unread=allNotifs.filter(n=>!n.read).length;
        document.getElementById('notifSubtitle').textContent=unread>0?`${unread} unread notification${unread>1?'s':''}`:'All caught up';
        const badge=document.getElementById('unreadBadge');
        if(unread>0){badge.textContent=unread;}else{badge.classList.add('hidden');}
      }
    }

    async function markAllRead(){
      const body=new URLSearchParams({action:'markAllRead'});
      const res=await fetch('/CtrlPlusSubmit/student/notifications',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body});
      const json=await res.json();
      if(json.success){
        allNotifs.forEach(n=>n.read=true);
        renderList();
        toast('All notifications marked as read.');
      }
    }

    load();
  </script>
</body>
</html>
