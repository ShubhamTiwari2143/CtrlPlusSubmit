<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CtrlPlusSubmit — Submissions</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes gradientShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
    .sidebar-gradient{background:linear-gradient(160deg,#0f766e,#0d9488,#06b6d4);background-size:200% 200%;animation:gradientShift 8s ease infinite}
    .nav-link{transition:all .2s}.nav-link:hover,.nav-link.active{background:rgba(255,255,255,.18);border-radius:10px}
    .modal-overlay{background:rgba(0,0,0,0.45)}
    .input-field:focus{outline:none;border-color:#0d9488;box-shadow:0 0 0 3px rgba(13,148,136,.15)}
    .toast-enter{animation:toastIn .3s ease}
    @keyframes toastIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
    .status-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:8px;font-size:11px;font-weight:600}
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar-gradient w-64 min-h-screen flex flex-col fixed left-0 top-0 z-30 shadow-xl">
    <div class="px-6 py-6 border-b border-white border-opacity-20">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-white bg-opacity-20 rounded-xl flex items-center justify-center"><svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg></div>
        <div><p class="text-white font-bold text-base leading-tight">CtrlPlusSubmit</p><p class="text-teal-200 text-xs">Faculty Panel</p></div>
      </div>
    </div>
    <nav class="flex-1 px-4 py-5 space-y-1">
      <p class="text-teal-300 text-xs font-semibold uppercase tracking-wider px-3 mb-3">Menu</p>
      <a href="dashboard.html" class="nav-link flex items-center gap-3 px-3 py-2.5 text-teal-100 text-sm font-medium"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>Dashboard</a>
      <a href="tasks.html" class="nav-link flex items-center gap-3 px-3 py-2.5 text-teal-100 text-sm font-medium"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>My Tasks</a>
      <a href="submissions.html" class="nav-link active flex items-center gap-3 px-3 py-2.5 text-white text-sm font-medium"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>Submissions</a>
    </nav>
    <div class="px-4 py-5 border-t border-white border-opacity-20"><a href="/CtrlPlusSubmit/auth/logout" class="flex items-center gap-3 px-3 py-2.5 text-teal-200 text-sm font-medium rounded-xl hover:bg-white hover:bg-opacity-15 transition-all"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>Logout</a></div>
  </aside>

  <!-- ===== MAIN ===== -->
  <main class="ml-64 flex-1 p-8">
    <div id="toast" class="hidden fixed top-5 right-5 z-50 px-5 py-3 rounded-xl shadow-lg text-sm font-medium flex items-center gap-2 toast-enter"></div>

    <div class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-2xl font-bold text-gray-800">Submissions</h1>
        <p class="text-gray-500 text-sm mt-0.5" id="pageSubtitle">All student submissions for your tasks</p>
      </div>
      <!-- Status Filter -->
      <div class="flex gap-2 bg-white border border-gray-200 rounded-xl p-1 shadow-sm">
        <button onclick="filterStatus('')"     id="tab_all"       class="tab-btn px-3 py-1.5 rounded-lg text-xs font-semibold bg-teal-500 text-white transition-all">All</button>
        <button onclick="filterStatus('SUBMITTED,LATE')" id="tab_pending"   class="tab-btn px-3 py-1.5 rounded-lg text-xs font-semibold text-gray-500 hover:bg-gray-50 transition-all">To Review</button>
        <button onclick="filterStatus('APPROVED')"       id="tab_approved"  class="tab-btn px-3 py-1.5 rounded-lg text-xs font-semibold text-gray-500 hover:bg-gray-50 transition-all">Approved</button>
        <button onclick="filterStatus('NEEDS_IMPROVEMENT')" id="tab_needs" class="tab-btn px-3 py-1.5 rounded-lg text-xs font-semibold text-gray-500 hover:bg-gray-50 transition-all">Needs Work</button>
        <button onclick="filterStatus('REJECTED')"       id="tab_rejected" class="tab-btn px-3 py-1.5 rounded-lg text-xs font-semibold text-gray-500 hover:bg-gray-50 transition-all">Rejected</button>
      </div>
    </div>

    <!-- Submissions Table -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-gray-50 border-b border-gray-100">
              <th class="text-left px-5 py-3.5 text-gray-500 font-semibold text-xs uppercase tracking-wider">Student</th>
              <th class="text-left px-5 py-3.5 text-gray-500 font-semibold text-xs uppercase tracking-wider">Task</th>
              <th class="text-left px-5 py-3.5 text-gray-500 font-semibold text-xs uppercase tracking-wider">Status</th>
              <th class="text-left px-5 py-3.5 text-gray-500 font-semibold text-xs uppercase tracking-wider">Marks</th>
              <th class="text-left px-5 py-3.5 text-gray-500 font-semibold text-xs uppercase tracking-wider">Submitted</th>
              <th class="text-right px-5 py-3.5 text-gray-500 font-semibold text-xs uppercase tracking-wider">Actions</th>
            </tr>
          </thead>
          <tbody id="submissionsBody">
            <tr><td colspan="6" class="text-center py-10 text-gray-400">Loading submissions...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- ===== REVIEW MODAL ===== -->
  <div id="reviewModal" class="hidden fixed inset-0 modal-overlay z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
      <div class="sticky top-0 bg-white px-6 py-4 border-b border-gray-100 rounded-t-2xl flex items-center justify-between">
        <h3 class="text-lg font-bold text-gray-800">Review Submission</h3>
        <button onclick="closeModal('reviewModal')" class="text-gray-400 hover:text-gray-600"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
      </div>

      <div class="p-6">
        <!-- Student & Task info -->
        <div class="bg-gray-50 rounded-xl p-4 mb-5 space-y-1">
          <p class="text-sm font-semibold text-gray-800" id="rv_student"></p>
          <p class="text-xs text-gray-500">Task: <span id="rv_taskTitle" class="font-medium text-gray-700"></span></p>
          <p class="text-xs text-gray-500">Submitted: <span id="rv_submittedAt" class="text-gray-600"></span></p>
          <p class="text-xs text-gray-500">Resubmits: <span id="rv_resubmit" class="text-gray-600"></span></p>
        </div>

        <!-- Student comment -->
        <div id="rv_commentBlock" class="hidden mb-4 bg-blue-50 border border-blue-100 rounded-xl p-4">
          <p class="text-xs font-semibold text-blue-600 mb-1">Student's comment</p>
          <p class="text-sm text-blue-800" id="rv_comment"></p>
        </div>

        <!-- Download file -->
        <div id="rv_fileBlock" class="hidden mb-5">
          <a id="rv_downloadLink" href="#" target="_blank"
             class="flex items-center gap-3 px-4 py-3 bg-teal-50 border border-teal-100 rounded-xl hover:bg-teal-100 transition-colors">
            <svg class="w-5 h-5 text-teal-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            <div>
              <p class="text-sm font-semibold text-teal-700" id="rv_fileName">Download File</p>
              <p class="text-xs text-teal-500" id="rv_fileSize"></p>
            </div>
            <svg class="w-4 h-4 text-teal-400 ml-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
          </a>
        </div>

        <!-- Review form -->
        <input type="hidden" id="rv_submissionId"/>
        <input type="hidden" id="rv_maxMarks"/>

        <div class="grid grid-cols-2 gap-4 mb-4">
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Marks (out of <span id="rv_maxMarksLabel">100</span>)</label>
            <input type="number" id="rv_marks" min="0" placeholder="e.g. 85"
                   class="input-field w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm bg-gray-50"/>
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Review Status <span class="text-red-400">*</span></label>
            <select id="rv_status" class="input-field w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm bg-gray-50">
              <option value="">Select status</option>
              <option value="APPROVED">✅ Approved</option>
              <option value="NEEDS_IMPROVEMENT">🔁 Needs Improvement</option>
              <option value="REJECTED">❌ Rejected</option>
              <option value="REVIEWED">📋 Reviewed</option>
            </select>
          </div>
        </div>

        <div class="mb-5">
          <label class="block text-xs font-semibold text-gray-600 mb-1">Faculty Remarks / Feedback</label>
          <textarea id="rv_remarks" rows="3" placeholder="Write your feedback for the student..."
                    class="input-field w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm bg-gray-50 resize-none"></textarea>
        </div>

        <div class="flex gap-3">
          <button onclick="closeModal('reviewModal')" class="flex-1 py-2.5 rounded-xl border border-gray-200 text-sm text-gray-600 font-medium hover:bg-gray-50">Cancel</button>
          <button onclick="submitReview()"
                  class="flex-1 py-2.5 rounded-xl bg-gradient-to-r from-teal-500 to-cyan-500 text-white text-sm font-semibold hover:opacity-90 transition-all flex items-center justify-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
            Submit Review
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let allSubs = [];
    let currentStatus = '';
    const params = new URLSearchParams(window.location.search);
    const taskIdFilter = params.get('taskId');

    // Status styles
    const statusStyle = {
      PENDING:'background:#f3f4f6;color:#6b7280',
      SUBMITTED:'background:#dbeafe;color:#1d4ed8',
      LATE:'background:#fef3c7;color:#b45309',
      REVIEWED:'background:#e0e7ff;color:#4338ca',
      APPROVED:'background:#d1fae5;color:#065f46',
      NEEDS_IMPROVEMENT:'background:#fef9c3;color:#854d0e',
      REJECTED:'background:#fee2e2;color:#991b1b'
    };

    function toast(msg, type='success') {
      const el = document.getElementById('toast');
      el.className = `fixed top-5 right-5 z-50 px-5 py-3 rounded-xl shadow-lg text-sm font-medium flex items-center gap-2 toast-enter ${type==='success'?'bg-green-500 text-white':'bg-red-500 text-white'}`;
      el.innerHTML = `<span>${type==='success'?'✓':'✕'}</span><span>${msg}</span>`;
      el.classList.remove('hidden');
      setTimeout(()=>el.classList.add('hidden'), 3500);
    }
    function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
    function esc(s) { return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    function fmtDate(iso) { if(!iso)return'—';try{return new Date(iso).toLocaleString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});}catch{return iso;} }

    async function loadSubmissions() {
      let url = '/CtrlPlusSubmit/faculty/review';
      if (taskIdFilter) {
        url += '?taskId=' + taskIdFilter;
        document.getElementById('pageSubtitle').textContent = 'Submissions for selected task';
      }
      const res  = await fetch(url);
      const json = await res.json();
      if (!json.success) { window.location.href='/CtrlPlusSubmit/views/auth/login.html'; return; }
      allSubs = json.data || [];
      renderTable(allSubs);
    }

    function filterStatus(status) {
      currentStatus = status;
      document.querySelectorAll('.tab-btn').forEach(b => {
        b.className = 'tab-btn px-3 py-1.5 rounded-lg text-xs font-semibold text-gray-500 hover:bg-gray-50 transition-all';
      });
      const tabId = status === '' ? 'tab_all'
        : status.includes(',') ? 'tab_pending'
        : 'tab_' + status.toLowerCase();
      const tab = document.getElementById(tabId);
      if (tab) tab.className = 'tab-btn px-3 py-1.5 rounded-lg text-xs font-semibold bg-teal-500 text-white transition-all';

      let filtered = allSubs;
      if (status) {
        const statuses = status.split(',');
        filtered = allSubs.filter(s => statuses.includes(s.status));
      }
      renderTable(filtered);
    }

    function renderTable(subs) {
        const tbody = document.getElementById('submissionsBody');
        if (!subs.length) {
          tbody.innerHTML = `<tr><td colspan="6" class="text-center py-12 text-gray-400">No submissions found.</td></tr>`; return;
        }

        tbody.innerHTML = subs.map(s => {
          const style = statusStyle[s.status] || 'background:#f3f4f6;color:#6b7280';
          const isAlreadyGraded = ['APPROVED', 'REJECTED', 'NEEDS_IMPROVEMENT', 'REVIEWED'].includes(s.status);
          const actionLabel = isAlreadyGraded ? 'Update Grade' : 'Review';
          
          return `
            <tr class="border-b border-gray-50 hover:bg-gray-50 transition-colors">
              <td class="px-5 py-4">
                <div class="flex items-center gap-3">
                  <div class="w-8 h-8 rounded-full bg-gradient-to-br from-teal-400 to-cyan-500 flex items-center justify-center text-white text-xs font-bold flex-shrink-0">
                    ${(s.studentName||'?').charAt(0).toUpperCase()}
                  </div>
                  <div>
                    <p class="font-semibold text-gray-800 text-sm">${esc(s.studentName||'—')}</p>
                    <p class="text-gray-400 text-xs">${esc(s.studentEmail||'')}</p>
                  </div>
                </div>
              </td>
              <td class="px-5 py-4 max-w-xs"><p class="text-gray-700 text-sm font-medium truncate">${esc(s.taskTitle||'—')}</p></td>
              <td class="px-5 py-4">
                <span class="status-chip" style="${style}">${s.status||'—'}</span>
              </td>
              <td class="px-5 py-4 text-sm font-semibold text-gray-700">
                ${s.marks !== null && s.marks !== undefined ? s.marks + ' / ' + (s.maxMarks||100) : '—'}
              </td>
              <td class="px-5 py-4 text-xs text-gray-500">${fmtDate(s.submittedAt)}</td>
              <td class="px-5 py-4">
                <div class="flex items-center justify-end gap-2">
                  <button onclick='openReviewModal(${JSON.stringify(s).replace(/'/g,"&apos;")})'
                          class="flex items-center gap-1.5 px-3 py-1.5 ${isAlreadyGraded ? 'bg-gray-100 text-gray-700 hover:bg-gray-200' : 'bg-teal-50 text-teal-700 hover:bg-teal-100'} text-xs font-semibold rounded-lg transition-colors">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                    ${actionLabel}
                  </button>
                </div>
              </td>
            </tr>
          `;
        }).join('');
      }
    function openReviewModal(s) {
      document.getElementById('rv_submissionId').value  = s.id;
      document.getElementById('rv_maxMarks').value      = s.maxMarks || 100;
      document.getElementById('rv_maxMarksLabel').textContent = s.maxMarks || 100;
      document.getElementById('rv_student').textContent = (s.studentName||'') + ' — ' + (s.studentEmail||'');
      document.getElementById('rv_taskTitle').textContent    = s.taskTitle || '—';
      document.getElementById('rv_submittedAt').textContent  = fmtDate(s.submittedAt);
      document.getElementById('rv_resubmit').textContent     = s.resubmitCount || 0;
      document.getElementById('rv_marks').value     = s.marks !== null ? s.marks : '';
      document.getElementById('rv_status').value    = s.status && ['APPROVED','NEEDS_IMPROVEMENT','REJECTED','REVIEWED'].includes(s.status) ? s.status : '';
      document.getElementById('rv_remarks').value   = s.facultyRemarks || '';

      // Comment
      if (s.comments) {
        document.getElementById('rv_comment').textContent = s.comments;
        document.getElementById('rv_commentBlock').classList.remove('hidden');
      } else {
        document.getElementById('rv_commentBlock').classList.add('hidden');
      }

      // File
      if (s.filePath) {
        const dlUrl = `/CtrlPlusSubmit/faculty/download?file=${encodeURIComponent(s.filePath)}&name=${encodeURIComponent(s.fileName||'submission')}`;
        document.getElementById('rv_downloadLink').href   = dlUrl;
        document.getElementById('rv_fileName').textContent = s.fileName || 'Download';
        document.getElementById('rv_fileSize').textContent = s.fileSizeKB ? s.fileSizeKB + ' KB' : '';
        document.getElementById('rv_fileBlock').classList.remove('hidden');
      } else {
        document.getElementById('rv_fileBlock').classList.add('hidden');
      }

      document.getElementById('reviewModal').classList.remove('hidden');
    }

    async function submitReview() {
      const submissionId = document.getElementById('rv_submissionId').value;
      const newStatus    = document.getElementById('rv_status').value;
      const marks        = document.getElementById('rv_marks').value;
      const remarks      = document.getElementById('rv_remarks').value.trim();
      const maxMarks     = parseInt(document.getElementById('rv_maxMarks').value);

      if (!newStatus) { toast('Please select a review status.','error'); return; }
      if (marks !== '' && parseInt(marks) > maxMarks) {
        toast(`Marks cannot exceed max marks (${maxMarks}).`,'error'); return;
      }

      const body = new URLSearchParams({ submissionId, newStatus, remarks });
      if (marks !== '') body.append('marks', marks);

      const res  = await fetch('/CtrlPlusSubmit/faculty/review', { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body });
      const json = await res.json();
      json.success ? (closeModal('reviewModal'), toast(json.message), loadSubmissions()) : toast(json.message,'error');
    }

    loadSubmissions();
  </script>
</body>
</html>
