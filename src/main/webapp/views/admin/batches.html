<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CtrlPlusSubmit — Batch Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes gradientShift { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
    .sidebar-gradient { background:linear-gradient(160deg,#4f46e5,#7c3aed,#9333ea);background-size:200% 200%;animation:gradientShift 8s ease infinite; }
    .nav-link { transition:all .2s ease; }
    .nav-link:hover,.nav-link.active { background:rgba(255,255,255,.18);border-radius:10px; }
    .modal-overlay { background:rgba(0,0,0,0.45); }
    .input-field:focus { outline:none;border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.15); }
    .toast-enter { animation:toastIn .3s ease; }
    @keyframes toastIn { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }
    .batch-card { transition:transform .2s ease,box-shadow .2s ease; }
    .batch-card:hover { transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,0,0,.1); }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar-gradient w-64 min-h-screen flex flex-col fixed left-0 top-0 z-30 shadow-xl">
    <div class="px-6 py-6 border-b border-white border-opacity-20">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-white bg-opacity-20 rounded-xl flex items-center justify-center">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
        </div>
        <div><p class="text-white font-bold text-base leading-tight">CtrlPlusSubmit</p><p class="text-purple-200 text-xs">Admin Panel</p></div>
      </div>
    </div>
    <nav class="flex-1 px-4 py-5 space-y-1">
      <p class="text-purple-300 text-xs font-semibold uppercase tracking-wider px-3 mb-3">Menu</p>
      <a href="dashboard.html" class="nav-link flex items-center gap-3 px-3 py-2.5 text-purple-100 text-sm font-medium"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>Dashboard</a>
      <a href="users.html" class="nav-link flex items-center gap-3 px-3 py-2.5 text-purple-100 text-sm font-medium"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>User Management</a>
      <a href="batches.html" class="nav-link active flex items-center gap-3 px-3 py-2.5 text-white text-sm font-medium"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>Batches</a>
      <a href="account-requests.html" class="nav-link flex items-center gap-3 px-3 py-2.5 text-purple-100 text-sm font-medium"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>Account Requests</a>
    </nav>
    <div class="px-4 py-5 border-t border-white border-opacity-20">
      <a href="/CtrlPlusSubmit/auth/logout" class="flex items-center gap-3 px-3 py-2.5 text-purple-200 text-sm font-medium rounded-xl hover:bg-white hover:bg-opacity-15 transition-all">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        Logout
      </a>
    </div>
  </aside>

  <!-- ===== MAIN ===== -->
  <main class="ml-64 flex-1 p-8">
    <div id="toast" class="hidden fixed top-5 right-5 z-50 px-5 py-3 rounded-xl shadow-lg text-sm font-medium flex items-center gap-2 toast-enter"></div>

    <div class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-2xl font-bold text-gray-800">Batch Management</h1>
        <p class="text-gray-500 text-sm mt-0.5">Create and manage course batches, assign faculty, enroll students</p>
      </div>
      <button onclick="openCreateModal()"
              class="flex items-center gap-2 px-4 py-2.5 bg-gradient-to-r from-indigo-500 to-purple-600
                     text-white text-sm font-semibold rounded-xl hover:from-indigo-600 hover:to-purple-700 transition-all shadow-md active:scale-95">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        New Batch
      </button>
    </div>

    <!-- Batch Cards Grid -->
    <div id="batchGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5">
      <div class="col-span-full text-center py-16 text-gray-400">Loading batches...</div>
    </div>
  </main>

  <!-- ===== CREATE BATCH MODAL ===== -->
  <div id="createModal" class="hidden fixed inset-0 modal-overlay z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6">
      <div class="flex items-center justify-between mb-5">
        <h3 class="text-lg font-bold text-gray-800">Create New Batch</h3>
        <button onclick="closeModal('createModal')" class="text-gray-400 hover:text-gray-600"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
      </div>
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Batch Name</label>
          <input id="c_batchName" type="text" placeholder="e.g. Java Full Stack — Batch A"
                 class="input-field w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm bg-gray-50"/>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Description (optional)</label>
          <textarea id="c_description" rows="2" placeholder="Short description..."
                    class="input-field w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm bg-gray-50 resize-none"></textarea>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Assign Faculty</label>
          <select id="c_facultyId" class="input-field w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm bg-gray-50">
            <option value="">Select faculty member</option>
          </select>
        </div>
      </div>
      <div class="flex gap-3 mt-6">
        <button onclick="closeModal('createModal')" class="flex-1 py-2.5 rounded-xl border border-gray-200 text-sm text-gray-600 font-medium hover:bg-gray-50">Cancel</button>
        <button onclick="createBatch()" class="flex-1 py-2.5 rounded-xl bg-gradient-to-r from-indigo-500 to-purple-600 text-white text-sm font-semibold hover:from-indigo-600 hover:to-purple-700 transition-all">Create Batch</button>
      </div>
    </div>
  </div>

  <!-- ===== ENROLL STUDENT MODAL ===== -->
  <div id="enrollModal" class="hidden fixed inset-0 modal-overlay z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6">
      <div class="flex items-center justify-between mb-5">
        <h3 class="text-lg font-bold text-gray-800">Enroll Student</h3>
        <button onclick="closeModal('enrollModal')" class="text-gray-400 hover:text-gray-600"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
      </div>
      <p class="text-sm text-gray-500 mb-4">Enrolling into: <strong id="enrollBatchName" class="text-gray-700"></strong></p>
      <input type="hidden" id="enrollBatchId"/>
      <div>
        <label class="block text-xs font-semibold text-gray-600 mb-1">Select Student</label>
        <select id="enrollStudentId" class="input-field w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm bg-gray-50">
          <option value="">Select a student</option>
        </select>
      </div>
      <div class="flex gap-3 mt-6">
        <button onclick="closeModal('enrollModal')" class="flex-1 py-2.5 rounded-xl border border-gray-200 text-sm text-gray-600 font-medium hover:bg-gray-50">Cancel</button>
        <button onclick="enrollStudent()" class="flex-1 py-2.5 rounded-xl bg-gradient-to-r from-teal-500 to-green-500 text-white text-sm font-semibold hover:opacity-90 transition-all">Enroll</button>
      </div>
    </div>
  </div>

  <script>
    let allStudents = [];

    function toast(msg, type='success') {
      const el = document.getElementById('toast');
      el.className = `fixed top-5 right-5 z-50 px-5 py-3 rounded-xl shadow-lg text-sm font-medium flex items-center gap-2 toast-enter ${type==='success'?'bg-green-500 text-white':'bg-red-500 text-white'}`;
      el.innerHTML = `<span>${type==='success'?'✓':'✕'}</span><span>${msg}</span>`;
      el.classList.remove('hidden');
      setTimeout(()=>el.classList.add('hidden'), 3500);
    }

    function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

    // ---- Load all batches ----
    async function loadBatches() {
      const res  = await fetch('/CtrlPlusSubmit/admin/batches');
      const json = await res.json();
      if (!json.success) { window.location.href='/CtrlPlusSubmit/views/auth/login.html'; return; }
      renderGrid(json.data);
    }

    function renderGrid(batches) {
      const grid = document.getElementById('batchGrid');
      if (!batches.length) {
        grid.innerHTML = `<div class="col-span-full text-center py-16 text-gray-400">No batches yet. Create your first one!</div>`;
        return;
      }

      const colors = ['from-indigo-400 to-purple-500','from-teal-400 to-green-500','from-amber-400 to-orange-500','from-pink-400 to-rose-500','from-blue-400 to-cyan-500'];

      grid.innerHTML = batches.map((b, i) => `
        <div class="batch-card bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
          <div class="h-2 bg-gradient-to-r ${colors[i % colors.length]}"></div>
          <div class="p-5">
            <div class="flex items-start justify-between mb-3">
              <h3 class="font-bold text-gray-800 text-sm leading-tight pr-2">${esc(b.batchName)}</h3>
              <span class="px-2 py-0.5 rounded-lg text-xs font-semibold flex-shrink-0
                ${b.isActive ? 'bg-emerald-100 text-emerald-700' : 'bg-gray-100 text-gray-500'}">
                ${b.isActive ? 'Active' : 'Inactive'}
              </span>
            </div>
            <p class="text-xs text-gray-500 mb-4 line-clamp-2">${esc(b.description || 'No description')}</p>

            <div class="flex items-center gap-4 text-xs text-gray-500 mb-4">
              <span class="flex items-center gap-1">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                ${esc(b.facultyName || 'Unassigned')}
              </span>
              <span class="flex items-center gap-1">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197"/></svg>
                ${b.studentCount ?? 0} students
              </span>
            </div>

            <div class="flex items-center gap-2">
              <button onclick="openEnrollModal(${b.id}, '${esc(b.batchName)}')"
                      class="flex-1 py-2 rounded-xl bg-indigo-50 text-indigo-600 text-xs font-semibold
                             hover:bg-indigo-100 transition-colors">
                + Enroll Student
              </button>
              <button onclick="toggleBatch(${b.id}, ${!b.isActive})"
                      class="p-2 rounded-xl ${b.isActive?'bg-amber-50 text-amber-600 hover:bg-amber-100':'bg-green-50 text-green-600 hover:bg-green-100'} transition-colors"
                      title="${b.isActive?'Deactivate':'Activate'}">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  ${b.isActive
                    ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z"/>'
                    : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>'}
                </svg>
              </button>
            </div>
          </div>
        </div>
      `).join('');
    }

    // ---- Load faculty for dropdown ----
    async function loadFacultyDropdown() {
      const res  = await fetch('/CtrlPlusSubmit/admin/batches?action=faculty');
      const json = await res.json();
      if (!json.success) return;
      const sel = document.getElementById('c_facultyId');
      json.data.forEach(f => {
        const opt = document.createElement('option');
        opt.value = f.id; opt.textContent = f.fullName;
        sel.appendChild(opt);
      });
    }

    // ---- Open create modal ----
    async function openCreateModal() {
      document.getElementById('c_batchName').value = '';
      document.getElementById('c_description').value = '';
      document.getElementById('c_facultyId').innerHTML = '<option value="">Select faculty member</option>';
      await loadFacultyDropdown();
      document.getElementById('createModal').classList.remove('hidden');
    }

    // ---- Create batch ----
    async function createBatch() {
      const body = new URLSearchParams({
        batchName:   document.getElementById('c_batchName').value.trim(),
        description: document.getElementById('c_description').value.trim(),
        facultyId:   document.getElementById('c_facultyId').value
      });
      const res  = await fetch('/CtrlPlusSubmit/admin/batches', { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body });
      const json = await res.json();
      json.success ? (closeModal('createModal'), toast(json.message), loadBatches()) : toast(json.message,'error');
    }

    // ---- Toggle batch ----
    async function toggleBatch(batchId, activate) {
      const body = new URLSearchParams({ action:'toggle', batchId, isActive: activate });
      const res  = await fetch('/CtrlPlusSubmit/admin/batches', { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body });
      const json = await res.json();
      json.success ? (toast(json.message), loadBatches()) : toast(json.message,'error');
    }

    // ---- Open enroll modal ----
    async function openEnrollModal(batchId, batchName) {
      document.getElementById('enrollBatchId').value  = batchId;
      document.getElementById('enrollBatchName').textContent = batchName;

      // Load all students
      const res  = await fetch('/CtrlPlusSubmit/admin/users?role=STUDENT');
      const json = await res.json();
      const sel  = document.getElementById('enrollStudentId');
      sel.innerHTML = '<option value="">Select a student</option>';
      (json.data || []).forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.id; opt.textContent = s.fullName + ' (' + s.email + ')';
        sel.appendChild(opt);
      });
      document.getElementById('enrollModal').classList.remove('hidden');
    }

    // ---- Enroll student ----
    async function enrollStudent() {
      const body = new URLSearchParams({
        action:    'addStudent',
        batchId:   document.getElementById('enrollBatchId').value,
        studentId: document.getElementById('enrollStudentId').value
      });
      const res  = await fetch('/CtrlPlusSubmit/admin/batches', { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body });
      const json = await res.json();
      json.success ? (closeModal('enrollModal'), toast(json.message), loadBatches()) : toast(json.message,'error');
    }

    function esc(s) { return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

    loadBatches();
  </script>
</body>
</html>
